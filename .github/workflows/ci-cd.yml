name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build & Test backend ──────────────────────────────────────
  backend-test:
    name: Backend — Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore
        working-directory: ./backend

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: ./backend

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: ./backend

  # ── 2. Build & push backend Docker image ────────────────────────
  backend-docker:
    name: Backend — Docker Build & Push
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy backend to Render ─────────────────────────────────
  backend-deploy:
    name: Backend — Deploy to Render
    runs-on: ubuntu-latest
    needs: backend-docker
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── 4. Build & push frontend Docker image ───────────────────────
  frontend-docker:
    name: Frontend — Docker Build & Push
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max